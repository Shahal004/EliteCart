<!DOCTYPE html>
<html>

<head>

    <title>Checkout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-5">

        <h1 class="mb-4">
            Delivery Address
        </h1>

        <form method="post">

            {% csrf_token %}

            <input type="text"
                   name="full_name"
                   placeholder="Full Name"
                   class="form-control mb-3"
                   required>

            <input type="text"
                   name="phone"
                   placeholder="Phone Number"
                   class="form-control mb-3"
                   required>

            <textarea name="address"
                      placeholder="Address"
                      class="form-control mb-3"
                      required></textarea>

            <input type="text"
                   name="city"
                   placeholder="City"
                   class="form-control mb-3"
                   required>

            <input type="text"
                   name="pincode"
                   placeholder="Pincode"
                   class="form-control mb-3"
                   required>

            <button class="btn btn-dark btn-lg">

                Continue to Payment

            </button>

        </form>

    </div>

</div>

</body>

</html>
